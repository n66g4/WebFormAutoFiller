<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配置解析工具</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
      padding: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 5px;
      color: #2d3748;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #718096;
      margin-bottom: 15px;
      font-size: 12px;
    }

    .two-column {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #4a5568;
      margin-bottom: 4px;
    }

    input[type="text"], input[type="file"], textarea, select {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    textarea {
      min-height: 60px;
      resize: vertical;
    }

    button {
      padding: 8px 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
      margin-right: 8px;
      margin-top: 6px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      background: #cbd5e0;
      box-shadow: none;
    }

    button.secondary:hover {
      background: #a0aec0;
    }

    .fields-list {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 8px;
      background: #fafbfc;
    }

    .field-item {
      padding: 10px;
      margin-bottom: 8px;
      background: white;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
      transition: all 0.2s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .field-item:hover {
      border-color: #667eea;
      box-shadow: 0 2px 4px rgba(102, 126, 234, 0.1);
    }

    .field-item.__selected-field {
      background: #eff6ff;
      border-color: #667eea;
      border-width: 2px;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
    }

    .field-item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
      gap: 8px;
    }

    .field-item-main {
      flex: 1;
      min-width: 0;
    }

    .field-item-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .field-select-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      color: #2d3748;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .field-item-input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      font-size: 12px;
      margin-top: 4px;
      transition: border-color 0.2s;
    }

    .field-item-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
    }

    .field-item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .field-type-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 6px;
      background: #edf2f7;
      color: #4a5568;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 500;
    }

    .field-item-xpath {
      font-size: 10px;
      color: #718096;
      font-family: 'Courier New', monospace;
      word-break: break-all;
      background: #f7fafc;
      padding: 4px 8px;
      border-radius: 3px;
      margin-top: 6px;
      border: 1px solid #e2e8f0;
      cursor: pointer;
      transition: all 0.2s;
    }

    .field-item-xpath:hover {
      background: #edf2f7;
      border-color: #cbd5e0;
    }

    .field-item-xpath.collapsed {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .field-item-preview {
      font-size: 11px;
      color: #718096;
      margin-top: 4px;
      font-style: italic;
      padding-left: 4px;
      border-left: 2px solid #e2e8f0;
    }

    .secondary-btn {
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 4px;
      border: 1px solid #cbd5e0;
      background: #edf2f7;
      color: #2d3748;
      cursor: pointer;
    }

    .secondary-btn:hover {
      background: #e2e8f0;
    }

    .preview-area {
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 8px;
      max-height: 400px;
      overflow: auto;
      background: #f7fafc;
    }

    .preview-area iframe {
      width: 100%;
      height: 380px;
      border: none;
      border-radius: 4px;
    }

    h3 {
      font-size: 14px;
      margin-bottom: 6px;
      color: #2d3748;
      font-weight: 600;
    }

    .json-output {
      background: #1a202c;
      color: #68d391;
      padding: 8px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      overflow-x: auto;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .info-box {
      background: #bee3f8;
      color: #2c5282;
      padding: 6px 10px;
      border-radius: 4px;
      margin-top: 8px;
      font-size: 11px;
      border-left: 3px solid #4299e1;
    }

    .error-box {
      background: #fed7d7;
      color: #742a2a;
      padding: 6px 10px;
      border-radius: 4px;
      margin-top: 8px;
      font-size: 11px;
      border-left: 3px solid #f56565;
    }

    .success-box {
      background: #c6f6d5;
      color: #22543d;
      padding: 6px 10px;
      border-radius: 4px;
      margin-top: 8px;
      font-size: 11px;
      border-left: 3px solid #48bb78;
    }

    .delete-btn {
      background: #fee;
      color: #c53030;
      padding: 4px 8px;
      border: 1px solid #feb2b2;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .delete-btn:hover {
      background: #f56565;
      color: white;
      border-color: #f56565;
    }


    .config-fields-display {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 8px;
      margin-bottom: 12px;
      max-height: 300px;
      overflow-y: auto;
    }

    .config-field-row {
      display: grid;
      grid-template-columns: 100px 1fr 2fr;
      gap: 8px;
      padding: 6px;
      margin-bottom: 4px;
      background: white;
      border-radius: 4px;
      border-left: 3px solid #667eea;
      align-items: center;
    }

    .config-field-key {
      font-weight: 600;
      color: #667eea;
      font-size: 12px;
      font-family: monospace;
    }

    .config-field-label {
      font-weight: 500;
      color: #2d3748;
      font-size: 12px;
    }

    .config-field-xpath {
      font-size: 10px;
      color: #718096;
      font-family: monospace;
      word-break: break-all;
      background: #edf2f7;
      padding: 4px 6px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 配置解析工具</h1>
    <p class="subtitle">解析 MHTML 页面并生成配置文件</p>

    <div class="form-group">
      <label for="mhtmlFile">上传 MHTML 文件:</label>
      <input type="file" id="mhtmlFile" accept=".mhtml,.mht">
      <div class="info-box" style="margin-top: 10px;">
        <strong>💡 提示：</strong>在目标页面使用"文件 > 另存为"保存为 MHTML 格式，然后上传到这里进行解析
      </div>
    </div>

    <div class="form-group">
      <label for="configName">配置名称:</label>
      <input type="text" id="configName" placeholder="新配置">
    </div>

    <div class="form-group">
      <label for="configDescription">配置描述:</label>
      <textarea id="configDescription" placeholder="用于填充..."></textarea>
    </div>

    <div id="jsonOutputArea" style="display: none; margin-top: 12px;">
      <h3>生成的配置字段映射</h3>
      <div id="configFieldsDisplay" style="margin-bottom: 12px;"></div>
      <h3>完整的 JSON 配置</h3>
      <textarea id="jsonOutput" class="json-output" readonly></textarea>
    </div>

    <button id="parseBtn">解析页面</button>
    <button id="generateJsonBtn" class="secondary" disabled>生成 JSON 配置</button>
    <button id="importConfigBtn" class="secondary" disabled>导入到扩展</button>
    <button id="downloadBtn" class="secondary" disabled>下载配置文件</button>

    <div id="message"></div>

    <div id="resultsArea" style="display: none;">
      <div>
        <h3>检测到的表单字段</h3>
        <div id="fieldsList" class="fields-list"></div>
      </div>
      <div style="margin-top: 12px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
          <h3 style="margin: 0;">页面预览</h3>
          <button id="toggleSelectModeBtn" class="secondary" style="padding: 6px 12px; font-size: 12px;">开始选择元素</button>
        </div>
        <div id="selectModeHint" style="display: none; background: #667eea; color: white; padding: 6px 10px; border-radius: 4px; margin-bottom: 6px; font-size: 11px; text-align: center;">
          🎯 选择模式已开启，直接点击预览中的元素即可添加到字段列表
        </div>
        <div id="previewArea" class="preview-area"></div>
      </div>
    </div>
  </div>

  <script src="shared/storage.js"></script>
  <script src="shared/locator.js"></script>
  <script src="shared/xpath.js"></script>
  <script src="shared/dom-label.js"></script>
  <script src="shared/field-key.js"></script>
  <script src="config-parser.js"></script>
</body>
</html>
